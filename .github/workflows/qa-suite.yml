name: QA Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run full suite daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  NODE_VERSION: '20'
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
  JWT_SECRET: test-jwt-secret-for-ci-only
  OPSTOWER_API_KEY: test-api-key

jobs:
  # ==========================================
  # 1. Unit Tests
  # ==========================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Setup database
        working-directory: backend
        run: |
          npx prisma migrate deploy
          npx prisma generate

      - name: Run unit tests
        working-directory: backend
        run: npm run test:unit -- --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/lcov.info
          flags: unit-tests
          name: unit-tests

  # ==========================================
  # 2. Integration Tests
  # ==========================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Setup database
        working-directory: backend
        run: |
          npx prisma migrate deploy
          npx prisma generate

      - name: Run integration tests
        working-directory: backend
        run: npm run test:integration

  # ==========================================
  # 3. Smoke Tests (E2E)
  # ==========================================
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Setup database
        working-directory: backend
        run: |
          npx prisma migrate deploy
          npx prisma db seed || true

      - name: Start backend
        working-directory: backend
        run: npm start &
        env:
          PORT: 3001

      - name: Start frontend
        working-directory: frontend
        run: npm run dev &

      - name: Wait for services
        run: |
          npx wait-on http://localhost:3001/health --timeout 30000
          npx wait-on http://localhost:5173 --timeout 30000

      - name: Run Playwright smoke tests
        working-directory: frontend
        run: npx playwright test tests/e2e/smoke.spec.ts

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: smoke-test-results
          path: frontend/playwright-report/
          retention-days: 7

  # ==========================================
  # 4. Security Tests
  # ==========================================
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Setup database
        working-directory: backend
        run: |
          npx prisma migrate deploy

      - name: Start application
        working-directory: backend
        run: npm start &
        env:
          PORT: 3001

      - name: Wait for backend
        run: npx wait-on http://localhost:3001/health --timeout 30000

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run penetration tests
        run: |
          k6 run --out json=penetration-results.json tests/penetration/security.test.js

      - name: Check dependency vulnerabilities
        run: |
          cd backend && npm audit --audit-level high
          cd ../frontend && npm audit --audit-level high

      - name: Upload security results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-test-results
          path: |
            penetration-results.json
            security-audit-report.json
          retention-days: 30

  # ==========================================
  # 5. Edge Case Tests
  # ==========================================
  edge-case-tests:
    name: Edge Case Tests
    runs-on: ubuntu-latest
    needs: [smoke-tests]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          cd backend && npm ci
          cd ../frontend && npm ci

      - name: Setup database
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Start services
        run: |
          cd backend && npm start &
          sleep 5
          cd ../frontend && npm run dev &

      - name: Wait for services
        run: |
          npx wait-on http://localhost:3001/health --timeout 30000
          npx wait-on http://localhost:5173 --timeout 30000

      - name: Run edge case tests
        working-directory: frontend
        run: npx playwright test tests/e2e/edge-cases.spec.ts

  # ==========================================
  # 6. Performance/Load Tests (Scheduled only)
  # ==========================================
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[perf]')

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Setup database
        working-directory: backend
        run: |
          npx prisma migrate deploy
          # Seed with large dataset
          npm run db:seed:large || true

      - name: Start application
        working-directory: backend
        run: npm start &
        env:
          PORT: 3001
          NODE_ENV: production

      - name: Wait for backend
        run: npx wait-on http://localhost:3001/health --timeout 30000

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run load tests
        run: |
          k6 run --out json=load-test-results.json tests/stress/api-load.test.js

      - name: Run spike tests
        run: |
          k6 run --out json=spike-test-results.json tests/stress/api-spike.test.js

      - name: Upload performance results
        uses: actions/upload-artifact@v3
        with:
          name: performance-test-results
          path: |
            load-test-results.json
            spike-test-results.json
          retention-days: 30

  # ==========================================
  # 7. Test Summary
  # ==========================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, smoke-tests, security-tests, edge-case-tests]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "# QA Test Suite Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.smoke-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Tests | ${{ needs.security-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Edge Case Tests | ${{ needs.edge-case-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.unit-tests.result }}" == "failure" ] || \
             [ "${{ needs.integration-tests.result }}" == "failure" ] || \
             [ "${{ needs.smoke-tests.result }}" == "failure" ] || \
             [ "${{ needs.security-tests.result }}" == "failure" ]; then
            echo "❌ **Some tests failed!**" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ **All critical tests passed!**" >> $GITHUB_STEP_SUMMARY
          fi
